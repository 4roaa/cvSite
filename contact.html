<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact | ROAA</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html"><div class="brand-mark"></div><div><h1>ROAA</h1><small data-i18n="hero_role">...</small></div></a>
    <nav class="menu">
      <a data-nav href="index.html" data-i18n="nav_home">Home</a>
      <a data-nav href="career.html" data-i18n="nav_career">Career Journey</a>
      <a data-nav href="expertise.html" data-i18n="nav_expertise">Technical Expertise</a>
      <a data-nav href="projects.html" data-i18n="nav_projects">Projects</a>
      <a data-nav href="contact.html" data-i18n="nav_contact">Contact</a>
    </nav>
    <div class="actions">
      <button class="btn" id="langBtn">AR</button>
      <a class="btn primary" href="projects.html" data-i18n="nav_projects">Projects</a>
    </div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="card pad reveal">
      <h2 data-i18n="contact_title">Contact</h2>
      <p class="lead" data-i18n="contact_lead">Send a message or connect via social profiles.</p>
    </div>

    <div class="grid" style="margin-top:14px;">
      <div class="tile col-6 reveal">
        <h3>Links</h3>
        <p style="margin-top:10px;">
          • LinkedIn<br>
          • GitHub<br>
          • Email
        </p>
      </div>

      <div class="tile col-6 reveal">
        <form class="form" id="contactForm">
          <input class="input" data-i18n-placeholder="form_name" placeholder="Name" required />
          <input class="input" type="email" data-i18n-placeholder="form_email" placeholder="Email" required />
          <input class="input" style="grid-column: span 2;" data-i18n-placeholder="form_subject" placeholder="Subject" required />
          <textarea class="input textarea" data-i18n-placeholder="form_message" placeholder="Message" required></textarea>
          <div class="form-actions">
            <button class="btn primary" type="submit" data-i18n="send">Send message</button>
            <a class="btn" href="index.html" data-i18n="nav_home">Home</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container foot">
    <small data-i18n="footer_note">Built by ROAA • Ready for GitHub Pages</small>
    <small>© <span id="y"></span> ROAA</small>
  </div>
</footer>

<script>
document.getElementById("y").textContent = new Date().getFullYear();
document.getElementById("contactForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  const lang = localStorage.getItem("site_lang") || "en";
  showToast(lang === "ar" ? "تم الإرسال (تجريبي)." : "Message sent (demo).");
  e.target.reset();
});
</script>
<script src="assets/i18n.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
